<style>
        body {
            background-color: #090B1A;
            color: #DFE1F7;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(24, 28, 53, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 46, 74, 0.8);
        }

        .primary-gradient-btn {
            background: linear-gradient(135deg, #F65F9D 0%, #D43D7B 100%);
            box-shadow: 0 4px 20px rgba(246, 95, 157, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(246, 95, 157, 0.5);
        }

        .primary-gradient-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .glow-bg {
            animation: pulse-glow 8s infinite ease-in-out;
            background: radial-gradient(circle at 50% 50%, rgba(246, 95, 157, 0.15) 0%, transparent 70%);
        }

        .float-anim {
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex items-center justify-center min-h-screen relative">

</div>
</div>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('.primary-gradient-btn');
            
            btn.addEventListener('mouseenter', () => {
                // Subtle haptic-like scaling of nearby elements or glow intensity
                const glow = document.querySelector('.glow-bg');
                glow.style.transform = 'scale(1.2)';
                glow.style.transition = 'transform 1s ease-out';
            });

            btn.addEventListener('mouseleave', () => {
                const glow = document.querySelector('.glow-bg');
                glow.style.transform = 'scale(1)';
            });

            // Smooth parallax effect for the floating logo
            document.addEventListener('mousemove', (e) => {
                const amount = 15;
                const x = (e.clientX / window.innerWidth - 0.5) * amount;
                const y = (e.clientY / window.innerHeight - 0.5) * amount;
                const floatEl = document.querySelector('.float-anim');
                floatEl.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
