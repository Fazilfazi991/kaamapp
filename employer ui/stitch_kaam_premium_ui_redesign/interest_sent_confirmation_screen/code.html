</div>

</div>
<!-- Details Bento Piece -->

</div>
</div>

<p class="font-body-md text-body-md font-bold text-on-surface">AED 35k - 45k</p>
</div>
</div>
<div class="glass-card bg-surface-container-low/40 rounded-lg p-sm flex items-start gap-sm">
<span class="material-symbols-outlined text-primary-container">location_on</span>

</div>
</div>
</div>
</div>

<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="font-label-md text-label-md text-secondary">Waiting for candidate response</span>
</div>
</section>
<!-- Action Buttons -->
<div class="flex flex-col gap-sm w-full">
<button class="w-full bg-primary-container text-white h-14 rounded-xl font-label-md text-body-md font-bold transition-all hover:brightness-110 active:scale-[0.98] shadow-lg flex items-center justify-center gap-sm">
                View Sent Interests
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full border-1.5 border-secondary text-secondary h-14 rounded-xl font-label-md text-body-md font-bold transition-all hover:bg-secondary/10 active:scale-[0.98] flex items-center justify-center gap-sm" style="border-width: 1.5px;">

<script>
        // Subtle micro-interaction: Button hover glow
        const primaryBtn = document.querySelector('button.bg-primary-container');
        primaryBtn.addEventListener('mousemove', (e) => {
            const rect = primaryBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            primaryBtn.style.setProperty('--x', `${x}px`);
            primaryBtn.style.setProperty('--y', `${y}px`);
        });
    </script>
<style>
        button.bg-primary-container {
            position: relative;
            overflow: hidden;
        }
        button.bg-primary-container::after {
            content: '';
            position: absolute;
            top: var(--y, 0);
            left: var(--x, 0);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
