<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Kaam - Company Onboarding</title>

                    "secondary-fixed": "#e5deff",
                    "surface-container-highest": "#303445",
                    "on-primary-fixed": "#3e001e",

          },

<style>
        body {
            background-color: #090B1A; /* Base Layer from Style Guidance */
            color: #dfe1f7;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(17, 20, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid #2A2E4A;
        }

        .input-focus-glow:focus {
            outline: none;
            border-color: #F65F9D;
            box-shadow: 0 0 0 2px rgba(246, 95, 157, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #11142A;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2A2E4A;
            border-radius: 10px;
        }

        .chip-selected {
            background: rgba(246, 95, 157, 0.15) !important;
            color: #F65F9D !important;
            border: 1px solid #F65F9D !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex min-h-screen items-center justify-center p-container-margin-mobile md:p-lg">
<!-- Top Navigation Anchor (Suppressed as per rules for Transactional/Onboarding but including Brand for context) -->
<header class="fixed top-0 left-0 w-full h-16 flex justify-between items-center px-container-margin-mobile md:px-container-margin-desktop z-50 backdrop-blur-xl border-b border-surface-variant/30">
<div class="text-headline-md font-headline-md font-bold text-on-surface">Kaam</div>
<div class="text-label-md font-label-md text-on-surface-variant">Step 1 of 5</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-4xl mt-16 mb-8 grid grid-cols-1 md:grid-cols-12 gap-gutter items-start">
<!-- Left Column: Context & Imagery (Asymmetric Pattern) -->
<div class="hidden md:flex md:col-span-4 flex-col gap-sm sticky top-24">
<div class="h-64 w-full rounded-xl overflow-hidden relative border border-surface-variant">
<div class="w-full h-full bg-cover bg-center" data-alt="A premium commercial high-rise building in Dubai International Financial Centre during twilight. The image captures the sleek glass architecture reflecting deep navy and vibrant pink city lights. The lighting is cinematic and high-end, embodying a corporate modern aesthetic with a sense of status and professionalism." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBbea0Hk7K8_zBNJ5hOA5wJi1pZeSCrho1xm1SJeX3thDBSMimcQwfZWuVFTMYcWdBTZ9KN5Uam5EtcT40nsVssbUZ0hhOShnX0KSMVcpgp79pyRfi_poxKC-_wyCbTF6peuSaGHf59nPnibAZpYadhon1ErhHIrNfe9vNaHa0E7u5lw8WM0B8YRisB9TLLKEYH_eD__T8xBA0QjggzEW4RJcJw-log6F99hAjED0RWaD8ko9I4b7fzTP1PpCxonE40XwUtalSvTnU-')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent opacity-60"></div>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">Build your elite presence.</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Complete your profile to attract the top 1% of talent in the UAE. Your company identity is the first step to a perfect match.</p>
</div>
<!-- Right Column: The Form (The Task) -->
<div class="col-span-1 md:col-span-8">
<div class="glass-panel p-md md:p-lg rounded-xl shadow-xl">
<div class="flex flex-col gap-gutter">
<!-- Form Header Mobile -->
<div class="md:hidden flex flex-col gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Company Details</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tell us about your organization.</p>
</div>
<!-- Step Progress Bar -->
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/5 transition-all duration-500"></div>
</div>
<form class="flex flex-col gap-sm">
<!-- Company Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Company Name</label>
<input class="w-full bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-[#7E829F] input-focus-glow transition-all" placeholder="e.g. Al-Mansouri Tech" type="text"/>
</div>
<!-- Industry Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Industry</label>
<div class="relative">
<select class="w-full appearance-none bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-[#7E829F] input-focus-glow transition-all">
<option disabled="" selected="" value="">Select industry</option>
<option>Fintech</option>
<option>Real Estate</option>
<option>Hospitality</option>
<option>Logistics &amp; Supply Chain</option>
<option>Technology &amp; AI</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Company Size Chips -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Company Size</label>
<div class="flex flex-wrap gap-xs" id="company-size-chips">
<button class="px-md py-xs rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high transition-colors border border-transparent" onclick="selectChip(this)" type="button">1-10</button>
<button class="px-md py-xs rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high transition-colors border border-transparent chip-selected" onclick="selectChip(this)" type="button">11-50</button>
<button class="px-md py-xs rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high transition-colors border border-transparent" onclick="selectChip(this)" type="button">51-200</button>
<button class="px-md py-xs rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high transition-colors border border-transparent" onclick="selectChip(this)" type="button">201-500</button>
<button class="px-md py-xs rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high transition-colors border border-transparent" onclick="selectChip(this)" type="button">500+</button>
</div>
</div>
<!-- Location & Office -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Location (UAE Emirates)</label>
<div class="relative">
<select class="w-full appearance-none bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface input-focus-glow transition-all">
<option>Dubai</option>
<option>Abu Dhabi</option>
<option>Sharjah</option>
<option>Ajman</option>
<option>Ras Al Khaimah</option>
<option>Fujairah</option>
<option>Umm Al Quwain</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">location_on</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Office area / branch</label>
<input class="w-full bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-[#7E829F] input-focus-glow transition-all" placeholder="e.g. Business Bay" type="text"/>
</div>
</div>
<div class="h-px bg-surface-variant/30 my-xs"></div>
<!-- Contact Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Contact Person Name</label>
<input class="w-full bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-[#7E829F] input-focus-glow transition-all" placeholder="Full Name" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface">Contact Person Role</label>
<input class="w-full bg-[#11142A] border border-[#2A2E4A] rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-[#7E829F] input-focus-glow transition-all" placeholder="e.g. HR Director" type="text"/>
</div>
</div>
<!-- CTA Section -->
<div class="flex items-center justify-between mt-md">
<button class="text-on-surface-variant font-label-md text-label-md hover:text-white transition-colors flex items-center gap-xs" type="button">
<span class="material-symbols-outlined text-[20px]">help_outline</span>
                                Why we need this?
                            </button>
<button class="bg-[#F65F9D] hover:opacity-90 active:scale-95 text-white px-xl py-sm rounded-lg font-label-md text-label-md shadow-lg shadow-primary-container/20 transition-all" type="submit">
                                Continue
                            </button>
</div>
</form>
</div>
</div>
<!-- Subtle Decorative Elements -->
<div class="mt-sm flex items-center justify-center gap-md opacity-30">
<span class="material-symbols-outlined text-[32px]">security</span>
<span class="material-symbols-outlined text-[32px]">verified_user</span>
<span class="material-symbols-outlined text-[32px]">cloud_done</span>
</div>
</div>
</main>
<!-- Background Atmospheric Effect -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute top-[40%] -left-[10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[100px] rounded-full"></div>
</div>
<script>
        function selectChip(element) {
            const container = document.getElementById('company-size-chips');
            const chips = container.getElementsByTagName('button');
            
            for (let chip of chips) {
                chip.classList.remove('chip-selected');
                chip.classList.remove('border-[#F65F9D]');
                chip.classList.add('bg-surface-variant');
                chip.classList.add('text-on-surface-variant');
            }
            
            element.classList.add('chip-selected');
            element.classList.remove('bg-surface-variant');
            element.classList.remove('text-on-surface-variant');
        }

        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
