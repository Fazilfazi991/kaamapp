name: kaam_perfect_match
description: Kaam - Perfect Match privacy-first job matching mobile app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.7
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^17.2.4
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.6.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - dark-logo.webp
    - .env
    - .env.qa
    - .env.production
