<body class="antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="glass-header sticky top-0 w-full z-50 flex justify-between items-center px-container-margin-mobile md:px-container-margin-desktop h-16">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary font-headline-md text-headline-md" data-icon="shield_person">shield_person</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Kaam</span>
</div>
<div>
<button class="text-primary hover:opacity-80 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin-mobile md:px-container-margin-desktop py-lg">
<!-- Header Section -->
<div class="text-center mb-xl max-w-2xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-sm">Let’s build your profile</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Complete a few steps so employers can discover you.</p>
</div>
<!-- Progress Cards Grid -->
<div class="w-full max-w-3xl flex flex-col gap-sm">
<!-- Card 1: Basic Details -->
<div class="card-layer rounded-xl p-md flex items-center justify-between card-hover transition-all duration-300">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-base">Basic Details</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Pending</p>
</div>
</div>
<button class="bg-primary-container text-white font-label-md text-label-md py-xs px-sm rounded-lg hover:opacity-90 transition-opacity">
                    Start
                </button>
</div>
<!-- Card 2: Work Preferences -->
<div class="card-layer rounded-xl p-md flex items-center justify-between card-hover transition-all duration-300 opacity-50 pointer-events-none">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-outline" data-icon="work">work</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-base">Work Preferences</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Pending</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<!-- Card 3: Skills & Experience -->

<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-outline" data-icon="school">school</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-base">Skills &amp; Experience</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Pending</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
