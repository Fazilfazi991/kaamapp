<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col">
<!-- Faux Background Content (Requests Screen Blur) -->
<div class="absolute inset-0 z-0 opacity-40 blur-sm pointer-events-none p-container-margin-mobile md:p-container-margin-desktop flex flex-col gap-md">
<!-- Mock TopAppBar -->
<div class="sticky top-0 w-full flex justify-between items-center h-16 mb-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">shield_person</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Kaam</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg mb-md">Incoming Requests</h1>
<!-- Mock Cards -->
<div class="bg-[#181C35] border border-[#2A2E4A] rounded-xl p-md flex gap-md items-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high"></div>
<div class="flex-1">
<div class="h-6 w-1/3 bg-surface-container-high rounded mb-xs"></div>
<div class="h-4 w-1/2 bg-surface-container-high rounded"></div>
</div>
</div>
<div class="bg-[#181C35] border border-[#2A2E4A] rounded-xl p-md flex gap-md items-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high"></div>
<div class="flex-1">
<div class="h-6 w-1/4 bg-surface-container-high rounded mb-xs"></div>
<div class="h-4 w-2/3 bg-surface-container-high rounded"></div>
</div>
</div>
</div>
<!-- Overlay & Modal Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop bg-surface-dim/80 backdrop-blur-md">
<!-- Decline Confirmation Modal -->
<div class="bg-[#181C35] border border-[#2A2E4A] rounded-xl p-md md:p-lg shadow-[0_20px_50px_rgba(0,0,0,0.25)] max-w-sm w-full animate-fade-in-up">
<div class="flex justify-center mb-md">
<div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center border border-error-container/50">
<span class="material-symbols-outlined text-error-container text-3xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
</div>
<h2 class="font-headline-md text-headline-md text-center text-on-surface mb-sm">Decline this request?</h2>
<p class="font-body-md text-body-md text-center text-on-surface-variant mb-xl">
                The employer will not be able to contact you. This action cannot be undone.
            </p>
<div class="flex flex-col gap-sm">
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-[#FFFFFF] font-label-md text-label-md py-sm px-md rounded-lg transition-all duration-200 active:scale-[0.98] shadow-[0_0_15px_rgba(246,95,157,0.3)] hover:shadow-[0_0_20px_rgba(246,95,157,0.5)]">
                    Decline Request
                </button>
<button class="w-full bg-transparent text-[#B8BBD0] hover:text-[#FFFFFF] font-label-md text-label-md py-sm px-md rounded-lg transition-colors duration-200">
                    Cancel
                </button>
</div>
</div>
</div>
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
