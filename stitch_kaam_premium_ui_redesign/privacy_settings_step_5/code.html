<!-- Script for generic toggle behavior (moving the pill visually if not using pure CSS) - Pure CSS used above, but keeping structure robust -->
<script>
        // Simple script to toggle classes based on checkbox state if needed for advanced styling
        document.querySelectorAll('.toggle-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const label = this.nextElementSibling;
                if(this.checked) {
                    this.classList.add('translate-x-6', 'border-primary-container');
                    this.classList.remove('translate-x-0', 'border-surface-variant');
                    label.classList.add('bg-primary-container');
                    label.classList.remove('bg-surface-variant');
                } else {
                    this.classList.remove('translate-x-6', 'border-primary-container');
                    this.classList.add('translate-x-0', 'border-surface-variant');
                    label.classList.remove('bg-primary-container');
                    label.classList.add('bg-surface-variant');
                }
            });
        });
    </script>
