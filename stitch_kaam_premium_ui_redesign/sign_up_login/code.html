<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kaam - Sign Up / Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {

                        "on-tertiary-fixed-variant": "#72304d",
                        "on-tertiary-fixed": "#3c0321",
                        "on-surface": "#dfe1f7",
                        "surface-dim": "#0f1322",
                        "on-tertiary-container": "#541734",
                        "background": "#0f1322",

                        "surface-tint": "#ffb0c9",
                        "surface-container-low": "#171b2a",
                        "on-primary-container": "#600032",
                        "secondary-container": "#470cd9",
                        "primary-fixed": "#ffd9e3",
                        "on-primary-fixed": "#3e001e",
                        "inverse-primary": "#ae2565",

                        "inverse-on-surface": "#2c3040",
                        "primary-container": "#f65f9d",

                    "spacing": {

                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Manrope"],
                        "display-lg": ["Manrope"],

<style>
        body {
            background-color: #090B1A; /* Canvas background from style guidance */
        }
        .bg-card-layer {
            background-color: #181C35;
            border-color: #2A2E4A;
        }
        .bg-surface-layer {
            background-color: #11142A;
            border-color: #2A2E4A;
        }
        .focus-ring-primary:focus {
            border-color: #F65F9D;
            box-shadow: 0 0 0 2px rgba(246, 95, 157, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen flex flex-col items-center justify-center p-container-margin-mobile md:p-container-margin-desktop overflow-x-hidden relative">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container/5 blur-[100px]"></div>
</div>
<!-- Main Content Container (Card Layer) -->
<main class="w-full max-w-md z-10">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary mb-xs">Kaam</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Find your perfect career match.</p>
</div>
<!-- Glassmorphic Card -->
<div class="bg-card-layer border rounded-xl p-md md:p-lg shadow-[0_20px_40px_rgba(0,0,0,0.25)] backdrop-blur-md relative overflow-hidden group">
<!-- Form Section -->
<form action="#" class="space-y-sm" method="POST">
<div>
<label class="sr-only" for="identifier">Phone number or email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm bg-surface-layer border rounded-lg text-on-surface font-body-md text-body-md focus:outline-none focus-ring-primary transition-colors duration-200" id="identifier" name="identifier" placeholder="Phone number or email" type="text"/>
</div>
</div>
<button class="w-full flex justify-center py-sm px-md border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-white bg-primary-container hover:bg-[#e04e8b] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container focus:ring-offset-surface-dim transition-all duration-200" type="submit">
                    Continue
                </button>
</form>
<div class="mt-md mb-md">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-[#181C35] font-label-sm text-label-sm text-outline">Or</span>
</div>
</div>
</div>
<!-- Social/Alt Login Options -->
<div class="space-y-xs">
<button class="w-full flex items-center justify-center py-sm px-md bg-surface-layer border rounded-lg hover:bg-surface-variant/50 focus:outline-none focus-ring-primary transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-on-surface mr-sm" data-icon="phone_iphone">phone_iphone</span>
<span class="font-label-md text-label-md text-on-surface">Continue with phone</span>
</button>
<button class="w-full flex items-center justify-center py-sm px-md bg-surface-layer border rounded-lg hover:bg-surface-variant/50 focus:outline-none focus-ring-primary transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-on-surface mr-sm" data-icon="mail">mail</span>
<span class="font-label-md text-label-md text-on-surface">Continue with email</span>
</button>
<button class="w-full flex items-center justify-center py-sm px-md bg-surface-layer border rounded-lg hover:bg-surface-variant/50 focus:outline-none focus-ring-primary transition-colors duration-200" type="button">
<svg class="w-5 h-5 mr-sm" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Continue with Google</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" href="#">Login</a>
</p>
</div>
</main>
</body></html>
