<body class="min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-white">
<!-- Top App Bar - Linear/Transactional Page (Navigation suppressed, close action) -->
<header class="glass-header sticky top-0 w-full z-50 flex justify-between items-center px-container-margin-mobile md:px-container-margin-desktop h-16">
<button class="text-on-surface hover:opacity-80 transition-opacity p-2 -ml-2 flex items-center justify-center rounded-full active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary absolute left-1/2 -translate-x-1/2">Schedule Interview</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center pt-md pb-xl px-container-margin-mobile md:px-container-margin-desktop relative">
<!-- Decorative Ambient Light -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-64 bg-primary-container/10 blur-[100px] rounded-full pointer-events-none -z-10"></div>
<div class="w-full max-w-xl mx-auto space-y-md">
<!-- Context Card -->
<div class="form-card rounded-xl p-md flex items-center gap-sm transition-colors duration-300">
<div class="w-12 h-12 rounded-full overflow-hidden border border-outline-variant/30 flex-shrink-0 bg-surface-variant flex items-center justify-center">
<img alt="Candidate avatar" class="w-full h-full object-cover" data-alt="A professional headshot of a corporate candidate in a modern, dark-themed office setting with subtle pink neon accent lighting. High quality, corporate modern aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCN8pglf0mPBCsUk-rNoGL5WcSmB3NMjzO3ZuaXc9gD2fKyvKgz3JXK06iO169afG3nXu293PNijWJaXQIVf8yN00R3c8-Es8069UdgpvtSBOiSNUpKg6sZoWPwMsdmIsnre8ZerA2e9WiDB3Zx098NpDZ6q_vBBthu_Iy0DPbf3UfeOpNfI-9iOlYq7ro99DB6xPACMDwBYYsJQbmDw_ma8dhhGhkKbWExIsliIdidD8eTQDLEliQLvvudNIntuL_YUTB4QjOvoesu"/>
</div>
<div>
<h2 class="font-label-md text-label-md text-on-surface">Alex Mercer</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Senior Product Designer • TechFlow</p>
</div>
</div>
<!-- Form Container -->
<form class="form-card rounded-xl p-md space-y-gutter shadow-lg">
<!-- Date Selection -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface">Preferred Date</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">calendar_month</span>
</div>
<input class="input-field w-full rounded-lg pl-10 pr-4 py-3 font-body-md transition-all duration-200" required="" type="date"/>
</div>
</div>
<!-- Time Selection -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface">Preferred Time</label>
<div class="grid grid-cols-2 gap-sm">
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">schedule</span>
</div>
<input class="input-field w-full rounded-lg pl-10 pr-4 py-3 font-body-md transition-all duration-200" required="" type="time"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-on-surface-variant pointer-events-none">Start</span>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">update</span>
</div>
<input class="input-field w-full rounded-lg pl-10 pr-4 py-3 font-body-md transition-all duration-200" required="" type="time"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-on-surface-variant pointer-events-none">End</span>
</div>
</div>
</div>
<!-- Interview Mode -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface">Interview Mode</label>
<div class="flex flex-wrap gap-xs">
<button class="chip active px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-2 transition-all duration-200 hover:opacity-90" onclick="toggleChip(this)" type="button">
<span class="material-symbols-outlined text-[18px]">videocam</span>
                            Video Call
                        </button>
<button class="chip px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-2 transition-all duration-200 hover:opacity-90" onclick="toggleChip(this)" type="button">
<span class="material-symbols-outlined text-[18px]">chat</span>
                            WhatsApp
                        </button>
<button class="chip px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-2 transition-all duration-200 hover:opacity-90" onclick="toggleChip(this)" type="button">
<span class="material-symbols-outlined text-[18px]">location_on</span>
                            In-person
                        </button>
</div>
</div>
<!-- Notes -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface">Additional Notes <span class="text-on-surface-variant font-normal">(Optional)</span></label>
<textarea class="input-field w-full rounded-lg p-4 font-body-md min-h-[120px] resize-y transition-all duration-200" placeholder="e.g., Please bring a portfolio or specific questions..."></textarea>
</div>
</form>
</div>
</main>
<!-- Fixed Bottom Action Bar for Mobile / Centered for Web -->
<div class="fixed bottom-0 left-0 w-full p-4 pb-safe glass-header md:relative md:bg-transparent md:border-none md:pb-xl md:pt-0 z-40">
<div class="max-w-xl mx-auto flex gap-4">
<button class="flex-1 bg-primary-container text-white font-label-md text-label-md py-4 rounded-xl shadow-[0_4px_14px_0_rgba(246,95,157,0.39)] hover:shadow-[0_6px_20px_rgba(246,95,157,0.23)] hover:bg-[#ff72ad] transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">send</span>
                Send Availability
            </button>
</div>
</div>
<script>
        // Simple logic for chip selection
        function toggleChip(element) {
            // Remove active class from all chips in the same container
            const container = element.parentElement;
            const chips = container.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.classList.remove('active');
                chip.classList.add('bg-[#202542]', 'text-[#B8BBD0]', 'border-transparent');
                chip.classList.remove('bg-[rgba(246,95,157,0.15)]', 'text-[#F65F9D]', 'border-[rgba(246,95,157,0.3)]');
            });

            // Add active class to clicked chip
            element.classList.add('active');
            
            // Re-apply inline styles for active state to ensure specificity if needed, 
            // though relying on classes is cleaner. Let's just let the CSS handle it based on .active
        }
    </script>
