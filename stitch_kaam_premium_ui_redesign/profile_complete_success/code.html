<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Complete - Kaam</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb0c9",
                        "tertiary-fixed": "#ffd9e4",
                        "surface-container": "#1b1f2f",
                        "secondary-fixed": "#e5deff",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#8d004d",
                        "on-secondary": "#2f009c",
                        "tertiary-container": "#cf7d9d",
                        "surface-variant": "#303445",
                        "tertiary": "#ffb0cd",
                        "surface-bright": "#353849",
                        "outline": "#a58a91",
                        "on-secondary-fixed": "#1a0063",
                        "secondary": "#c9bfff",
                        "primary-fixed-dim": "#ffb0c9",
                        "on-tertiary-fixed-variant": "#72304d",
                        "on-tertiary-fixed": "#3c0321",
                        "on-surface": "#dfe1f7",
                        "surface-dim": "#0f1322",
                        "on-tertiary-container": "#541734",
                        "background": "#0f1322",
                        "secondary-fixed-dim": "#c9bfff",
                        "surface-tint": "#ffb0c9",
                        "surface-container-low": "#171b2a",
                        "on-primary-container": "#600032",
                        "secondary-container": "#470cd9",
                        "primary-fixed": "#ffd9e3",
                        "on-primary-fixed": "#3e001e",
                        "inverse-primary": "#ae2565",
                        "outline-variant": "#574147",
                        "inverse-on-surface": "#2c3040",
                        "primary-container": "#f65f9d",
                        "on-background": "#dfe1f7",
                        "on-secondary-fixed-variant": "#4503d7",
                        "on-primary": "#640035",
                        "surface-container-highest": "#303445",
                        "surface-container-high": "#252939",
                        "on-tertiary": "#571936",
                        "on-error-container": "#ffdad6",
                        "surface": "#0f1322",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb0cd",
                        "on-surface-variant": "#ddbfc7",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#baaeff",
                        "surface-container-lowest": "#090d1c",
                        "inverse-surface": "#dfe1f7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "sm": "16px",
                        "container-margin-desktop": "80px",
                        "base": "4px",
                        "gutter": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "md": "24px",
                        "container-margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Manrope"],
                        "display-lg": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-sm": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    },
                    "animation": {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    "keyframes": {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Entrance animations */
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col justify-center items-center px-container-margin-mobile relative overflow-hidden selection:bg-primary-container/30">
<!-- Atmospheric Background Elements -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-primary-container/5 rounded-full blur-[100px] pointer-events-none -z-10 animate-pulse-slow"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<main class="w-full max-w-md flex flex-col items-center text-center z-10">
<!-- Celebration Graphic -->
<div class="relative w-40 h-40 mb-lg flex items-center justify-center animate-fade-in-up">
<!-- Glowing ring -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-2xl animate-pulse"></div>
<!-- Central Badge -->
<div class="relative w-28 h-28 bg-surface-container rounded-full flex items-center justify-center border border-primary-container/30 shadow-[0_0_40px_rgba(246,95,157,0.25)] animate-float backdrop-blur-md">
<div class="absolute inset-0 rounded-full bg-gradient-to-br from-white/10 to-transparent"></div>
<span class="material-symbols-outlined text-primary-container text-6xl relative z-10" data-weight="fill">verified</span>
</div>
<!-- Floating Sparkles (CSS only for effect) -->
<span class="material-symbols-outlined text-tertiary-container absolute top-4 right-4 text-xl animate-bounce" style="animation-duration: 2s;">spark</span>
<span class="material-symbols-outlined text-primary-container absolute bottom-8 left-2 text-2xl animate-bounce" style="animation-duration: 3s; animation-delay: 0.5s;">celebration</span>
</div>
<!-- Typography Context -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs animate-fade-in-up delay-100">
            Your profile is ready 🎉
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mb-xl animate-fade-in-up delay-200">
            Employers can now discover your profile while your contact details stay private.
        </p>
<!-- Profile Strength Card -->
<div class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl p-md mb-xl flex items-center justify-between relative overflow-hidden shadow-lg animate-fade-in-up delay-300 group hover:bg-[#202542] transition-colors duration-300">
<!-- Glass reflection -->
<div class="absolute inset-0 bg-gradient-to-br from-white/[0.03] to-transparent pointer-events-none"></div>
<div class="text-left z-10">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Profile Status</h3>
<div class="flex items-baseline gap-2">
<span class="font-label-md text-label-md text-on-surface">Strength:</span>
<span class="font-headline-md text-headline-md text-primary-container">85%</span>
</div>
</div>
<!-- SVG Progress Ring -->
<div class="relative w-16 h-16 z-10 flex-shrink-0">
<svg class="w-full h-full transform -rotate-90 drop-shadow-md" viewbox="0 0 36 36">
<!-- Background Track -->
<path class="text-surface-variant/50" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5"></path>
<!-- Progress Arc -->
<path class="text-primary-container drop-shadow-[0_0_8px_rgba(246,95,157,0.6)]" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="85, 100" stroke-linecap="round" stroke-width="2.5"></path>
</svg>
<!-- Center Icon -->
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container text-sm">local_fire_department</span>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-white font-label-md text-label-md py-4 rounded-full hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 shadow-[0_4px_24px_rgba(246,95,157,0.3)] animate-fade-in-up delay-300 group relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
<span class="relative z-10">Go to Dashboard</span>
<span class="material-symbols-outlined text-lg relative z-10 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</main>
<style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</body></html>
