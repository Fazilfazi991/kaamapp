<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col items-center justify-center p-container-margin-mobile md:p-container-margin-desktop relative overflow-hidden">
<!-- Subtle Background Elements for Midnight Pulse vibe -->
<div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary-container opacity-5 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container opacity-5 blur-[100px] pointer-events-none"></div>
<!-- Top App Bar (Simplified for transactional flow, suppressing full shell) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin-mobile h-16 bg-surface/70 backdrop-blur-xl border-b border-outline-variant/30">
<button aria-label="Go back" class="text-primary hover:opacity-80 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary">Kaam</div>
<div class="w-6"></div> <!-- Spacer for alignment -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[400px] z-10 mt-16 md:mt-0 flex flex-col items-center">
<div class="w-20 h-20 mb-md rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/30 shadow-lg">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="dialpad">dialpad</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-center mb-xs">
            Verify your phone
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-xl">
            Enter the 6-digit code sent to your number
        </p>
<!-- OTP Form -->
<form class="w-full glass-panel rounded-xl p-md shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)]">
<div class="flex justify-between gap-2 mb-lg" id="otp-container">
<!-- 6 Inputs -->
<input aria-label="Digit 1" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 2" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 3" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 4" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 5" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 6" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center font-headline-md text-headline-md text-on-background rounded-lg transition-all duration-200" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<button class="w-full h-12 bg-primary-container text-[#FFFFFF] font-label-md text-label-md rounded-lg flex items-center justify-center transition-all duration-200 hover:bg-[#F65F9D]/90 active:scale-[0.98] shadow-[0_4px_12px_rgba(246,95,157,0.3)]" type="button">
                Verify
            </button>
<div class="mt-md text-center">
<span class="font-body-md text-body-md text-on-surface-variant">Didn't receive a code?</span>
<button class="ml-1 font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" type="button">
                    Resend code
                </button>
</div>
</form>
</main>
<script>
        // Simple OTP input logic
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
            
            // Focus first input on load
            if(inputs.length > 0) inputs[0].focus();
        });
    </script>
