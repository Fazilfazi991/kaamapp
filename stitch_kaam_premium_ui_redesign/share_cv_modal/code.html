<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-[#090B1A]/80 backdrop-blur-xl z-40 flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop transition-opacity duration-300">
<!-- Modal Content Card -->
<div class="bg-[#181C35] border border-[#2A2E4A] rounded-xl w-full max-w-md p-md md:p-lg shadow-[0_20px_40px_rgba(0,0,0,0.25)] relative overflow-hidden transform transition-all duration-300 scale-100 opacity-100">
<!-- Close Button (Top Right) -->
<button class="absolute top-md right-md text-[#B8BBD0] hover:text-primary-container transition-colors p-base rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Icon Header -->
<div class="flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high border border-outline-variant/30 mx-auto mb-md">
<span class="material-symbols-outlined text-primary-container text-[32px] font-variation-settings-'FILL'-1">assignment</span>
</div>
<!-- Text Content -->
<div class="text-center mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Share your CV?</h2>
<p class="font-body-md text-body-md text-[#B8BBD0]">Your CV will be shared only with this matched employer. They will be able to review your full professional history.</p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-sm w-full">
<button class="flex-1 px-sm py-[12px] rounded-lg border-[1.5px] border-[#6E4CFF] text-[#B8BBD0] hover:text-white bg-transparent hover:bg-surface-variant transition-colors font-label-md text-label-md flex items-center justify-center gap-base">
                    Cancel
                </button>
<button class="flex-1 px-sm py-[12px] rounded-lg bg-primary-container text-white hover:bg-primary-container/90 shadow-[0_0_15px_rgba(246,95,157,0.3)] transition-all font-label-md text-label-md flex items-center justify-center gap-base">
<span class="material-symbols-outlined text-[18px]">send</span>
                    Share CV
                </button>
</div>
</div>
</div>
</body></html>
